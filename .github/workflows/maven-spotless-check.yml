name: Check Formatting with Maven

on:
  workflow_dispatch:
  push:
    branches:
      - '**'        # matches every branch
      - '!master'   # excludes master
      - '!main'     # excludes main

jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          # this distribution is cached by github actions
          distribution: 'temurin'
          # jdk version to use, specified in pom.xml
          java-version: '21'
          # use the github actions cached jdk if available.
          check-latest: false
      - name: mvn spotless check
        # transfer progress is disabled to avoid spamming the log with progress bars
        run: mvn clean spotless:check --file pom.xml --no-transfer-progress
